project:
  type: website
  output-dir: _site

website:
  title: "Computer Programming I (Python)"
  description: "An introductory Python course designed specifically for Math students"
  site-url: https://daniprec.github.io/Python-Course
  repo-url: https://github.com/daniprec/Python-Course
  repo-actions: [edit, issue]
  
  page-navigation: true
  
  navbar:
    background: primary
    search: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Syllabus"
        href: syllabus.qmd
      - text: "Modules"
        menu:
          - text: "Python fundamentals"
            href: modules/python-fundamentals/_index.qmd
          - text: "Structures"
            href: modules/structures/_index.qmd
          - text: "NumPy"
            href: modules/numpy/_index.qmd
          - text: "IDEs & Tools"
            href: modules/ides/_index.qmd
    right:
      - icon: github
        href: https://github.com/daniprec/Python-Course
        aria-label: GitHub

  sidebar:
    style: "docked"
    search: true
    contents:
      - section: "Getting Started"
        contents:
          - text: "Home"
            href: index.qmd
          - text: "Syllabus"
            href: syllabus.qmd
      
      - section: "Module 1 — Python fundamentals"
        contents:
          - text: "Overview"
            href: modules/python-fundamentals/_index.qmd
          - text: "01 — Variables"
            href: modules/python-fundamentals/variables.qmd
          - text: "02 — Flow"
            href: modules/python-fundamentals/flow.qmd
          - text: "03 — Loops"
            href: modules/python-fundamentals/loops.qmd
          - text: "04 — Functions"
            href: modules/python-fundamentals/functions.qmd
          - text: "05 — Recursion"
            href: modules/python-fundamentals/recursion.qmd
          - text: "06 — Scope"
            href: modules/python-fundamentals/scope.qmd

      - section: "Module 2 — Structures"
        contents:
          - text: "Overview"
            href: modules/structures/_index.qmd
          - text: "01 — Lists & Tuples"
            href: modules/structures/list_tuples.qmd
          - text: "02 — Sets"
            href: modules/structures/sets.qmd
          - text: "03 — Dictionaries"
            href: modules/structures/dictionaries.qmd
          - text: "04 — Iterables & Loops"
            href: modules/structures/loops.qmd
          - text: "05 — Mutability"
            href: modules/structures/mutability.qmd

      - section: "Module 3 — NumPy"
        contents:
          - text: "Overview"
            href: modules/numpy/_index.qmd

      - section: "Module 4 — IDEs & Tools"
        contents:
          - text: "Overview"
            href: modules/ides/_index.qmd

  page-footer:
    left: "Copyright 2024"
    right: 
      - icon: github
        href: https://github.com/daniprec/Python-Course
        aria-label: GitHub

format:
  html:
    theme: cosmo
    css: assets/styles.css
    toc: true
    toc-depth: 3
    code-copy: true
    code-fold: false
    code-tools: true
    df-print: paged
    
jupyter: python3
project:
  type: website
  output-dir: _site

website:
  title: "Computer Programming I (Python)"
  description: "An introductory Python course designed specifically for Math students"
  site-url: https://daniprec.github.io/Python-Course
  repo-url: https://github.com/daniprec/Python-Course
  repo-actions: [edit, issue]
  
  page-navigation: true
  
  navbar:
    background: primary
    search: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Syllabus"
        href: syllabus.qmd
      - text: "Modules"
        menu:
          - text: "Module 1: Introduction to Python"
            href: modules/module1/_index.qmd
          - text: "Module 2: Data Structures"
            href: modules/module2/_index.qmd
          - text: "Module 3: Control Flow and Functions"
            href: modules/module3/_index.qmd
          - text: "Module 4: Advanced Topics"
            href: modules/module4/_index.qmd
    right:
      - icon: github
        href: https://github.com/daniprec/Python-Course
        aria-label: GitHub

  sidebar:
    style: "docked"
    search: true
    contents:
      - section: "Getting Started"
        contents:
          - text: "Home"
            href: index.qmd
          - text: "Syllabus"
            href: syllabus.qmd
      
      - section: "Module 1: Introduction to Python"
        contents:
          - text: "Overview"
            href: modules/module1/_index.qmd
          - text: "Lesson 1: Setting Up Python"
            href: modules/module1/lesson1.qmd
          - text: "Lesson 2: Variables and Data Types"
            href: modules/module1/lesson2.qmd
          - text: "Lesson 3: Basic Operations"
            href: modules/module1/lesson3.qmd
      
      - section: "Module 2: Data Structures"
        contents:
          - text: "Overview"
            href: modules/module2/_index.qmd
          - text: "Lesson 1: Lists and Tuples"
            href: modules/module2/lesson1.qmd
          - text: "Lesson 2: Dictionaries and Sets"
            href: modules/module2/lesson2.qmd
          - text: "Lesson 3: String Operations"
            href: modules/module2/lesson3.qmd
      
      - section: "Module 3: Control Flow and Functions"
        contents:
          - text: "Overview"
            href: modules/module3/_index.qmd
          - text: "Lesson 1: Conditional Statements"
            href: modules/module3/lesson1.qmd
          - text: "Lesson 2: Loops"
            href: modules/module3/lesson2.qmd
          - text: "Lesson 3: Functions"
            href: modules/module3/lesson3.qmd
      
      - section: "Module 4: Advanced Topics"
        contents:
          - text: "Overview"
            href: modules/module4/_index.qmd
          - text: "Lesson 1: File I/O"
            href: modules/module4/lesson1.qmd
          - text: "Lesson 2: Error Handling"
            href: modules/module4/lesson2.qmd
          - text: "Lesson 3: Libraries and Modules"
            href: modules/module4/lesson3.qmd

  page-footer:
    left: "Copyright 2024"
    right: 
      - icon: github
        href: https://github.com/daniprec/Python-Course
        aria-label: GitHub

format:
  html:
    theme: cosmo
    css: assets/styles.css
    toc: true
    toc-depth: 3
    code-copy: true
    code-fold: false
    code-tools: true
    df-print: paged
    
jupyter: python3

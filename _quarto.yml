          - text: "Application: RSA Encryption"
            href: modules/ides/rsa.qmd

  page-footer:
    left: "Copyright 2024, Computer Programming I"
    right: 
      - icon: github
        href: https://github.com/daniprec/Python-Course
        aria-label: GitHub

format:
  html:
    theme: cosmo
    css: assets/styles.css
    toc: true
    toc-depth: 3
    code-copy: true
    code-fold: false
    code-tools: true
    df-print: paged
    
jupyter: python3